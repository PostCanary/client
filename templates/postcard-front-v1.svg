<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 648 432" width="648" height="432">
  <defs>
    <!-- Left-side gradient overlay for text readability -->
    <linearGradient id="textOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2744" stop-opacity="0.88"/>
      <stop offset="45%" stop-color="#1a2744" stop-opacity="0.65"/>
      <stop offset="70%" stop-color="#1a2744" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a2744" stop-opacity="0"/>
    </linearGradient>
    <!-- Green strip gradient (subtle depth) -->
    <linearGradient id="greenStrip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ab04c"/>
      <stop offset="100%" stop-color="#5a9a3e"/>
    </linearGradient>
    <!-- Navy bar gradient -->
    <linearGradient id="navyBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2947"/>
      <stop offset="100%" stop-color="#162035"/>
    </linearGradient>
  </defs>

  <!-- ============================================ -->
  <!-- LAYER: Photo Background                      -->
  <!-- Replace with actual hero photo               -->
  <!-- Photo: subject RIGHT, open sky LEFT          -->
  <!-- ============================================ -->
  <rect id="hero_photo" x="0" y="0" width="648" height="432" fill="#5d8aa8"/>
  <!-- Simulated sky/building shapes (sharp corners per Draplin) -->
  <rect x="0" y="200" width="648" height="232" fill="#3d6d4a" opacity="0.2"/>
  <rect x="360" y="60" width="180" height="180" fill="#8faab4" opacity="0.4"/>
  <rect x="410" y="40" width="140" height="200" fill="#7a9ba8" opacity="0.5"/>
  <rect x="520" y="80" width="100" height="160" fill="#6d8f9c" opacity="0.35"/>
  <!-- Placeholder label -->
  <text x="480" y="155" font-family="sans-serif" font-size="11" fill="white" opacity="0.4" text-anchor="middle">HERO PHOTO</text>

  <!-- ============================================ -->
  <!-- LAYER: Dark Gradient Overlay (left side)     -->
  <!-- Makes headline readable over any photo       -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="648" height="240" fill="url(#textOverlay)"/>

  <!-- ============================================ -->
  <!-- ZONE 1: Headline Block (top-left, ~55%)      -->
  <!-- Proportions matched to HAC-1000 reference    -->
  <!-- ============================================ -->
  <text id="headline_1" x="32" y="68"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="44" fill="white" letter-spacing="1">
    THE SUMMER
  </text>
  <text id="headline_2" x="32" y="114"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="44" fill="white" letter-spacing="1">
    HEAT IS HERE
  </text>
  <text id="subline" x="32" y="138"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="400" font-size="13" fill="white" opacity="0.9"
        font-style="italic">
    &#8212;stay comfortable with a
  </text>
  <text id="headline_3" x="32" y="186"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="52" fill="white" letter-spacing="1.5">
    NEW A/C
  </text>
  <text id="headline_4" x="32" y="232"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="52" fill="white" letter-spacing="1.5">
    SYSTEM!
  </text>

  <!-- ============================================ -->
  <!-- ZONE 2: Green Offer Strip (~13%, 56pt)       -->
  <!-- Gendusa: offer drives the flip               -->
  <!-- Halbert: "$750 OFF" must POP — bold, large   -->
  <!-- ============================================ -->
  <rect id="offer_strip_bg" x="0" y="240" width="648" height="56" fill="url(#greenStrip)"/>

  <!-- Offer: "$750 OFF" is the star — oversized bold -->
  <text id="offer_prefix" x="32" y="275"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="600" font-size="18" fill="white">
    Get
  </text>
  <text id="offer_amount" x="62" y="275"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="28" fill="#ffeb3b" letter-spacing="0.5">
    $750 OFF
  </text>
  <text id="offer_detail" x="195" y="275"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="400" font-size="16" fill="white">
    a full A/C system replacement
  </text>

  <!-- ============================================ -->
  <!-- ZONE 3: Navy Info Bar (~32%, 136pt)           -->
  <!-- Proportions matched to HAC-1000 reference    -->
  <!-- Logo LEFT, CTA center, Phone RIGHT dominant  -->
  <!-- ============================================ -->
  <rect id="info_bar_bg" x="0" y="296" width="648" height="136" fill="url(#navyBar)"/>

  <!-- Logo area (left) — larger per reference -->
  <rect id="logo_placeholder" x="24" y="320" width="64" height="64" rx="32" fill="#e8731a"/>
  <text x="56" y="356" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">LOGO</text>

  <text id="business_name" x="100" y="348"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="24" fill="white">
    ABC
  </text>
  <text id="business_tagline" x="100" y="370"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="600" font-size="12" fill="white" opacity="0.85">
    HEATING &amp; AIR
  </text>

  <!-- CTA text (center-left) -->
  <text id="cta_text" x="260" y="348"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="400" font-size="12" fill="white" opacity="0.9"
        font-style="italic">
    Call today to schedule your service!
  </text>

  <!-- Phone number (right) — DOMINANT element per Whitman Z-pattern end -->
  <text id="phone_number" x="616" y="352"
        font-family="'Oswald', 'Impact', 'Arial Black', sans-serif"
        font-weight="700" font-size="30" fill="white" text-anchor="end">
    1-800-628-1804
  </text>

  <!-- Website (bottom-right) -->
  <text id="website_url" x="616" y="386"
        font-family="'Open Sans', 'Helvetica', sans-serif"
        font-weight="400" font-size="11" fill="white" opacity="0.65" text-anchor="end">
    abcheating.com
  </text>

  <!-- Thin separator line above navy bar -->
  <line x1="0" y1="296" x2="648" y2="296" stroke="#4a5a7a" stroke-width="0.5" opacity="0.5"/>
</svg>
