<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>WeasyPrint Spike 01</title>
<style>
  @page {
    size: 9in 6in;
    margin: 0;
  }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "DejaVu Sans", sans-serif;
  }
  .card {
    width: 9in;
    height: 6in;
    position: relative;
    background: #ffffff;
  }
  .banner {
    background: #006db2;
    color: #ffffff;
    padding: 24px 48px;
    font-size: 28pt;
    font-weight: bold;
    text-align: center;
  }
  .body {
    padding: 32px 48px;
    font-size: 14pt;
    line-height: 1.5;
    color: #323232;
  }
  .chip {
    display: inline-block;
    background: #a5cf47;
    color: #1a4d0d;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: bold;
    margin-top: 16px;
  }
  .footer {
    position: absolute;
    bottom: 24px;
    left: 48px;
    right: 48px;
    font-size: 10pt;
    color: #666666;
    border-top: 1px solid #cccccc;
    padding-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="banner">PostCanary WeasyPrint Spike 01</div>
  <div class="body">
    <p>If you can read this rendered as a PDF at 9×6 inches with the blue banner on top and the green chip below, WeasyPrint is working on Linux.</p>
    <p>Next spike: @font-face with Oswald Bold.</p>
    <span class="chip">HELLO WORLD</span>
  </div>
  <div class="footer">Rendered by WeasyPrint inside python:3.11-slim Docker container.</div>
</div>
</body>
</html>
